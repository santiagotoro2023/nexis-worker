# Nexis Worker — Release Pipeline
# Builds: Android APK + Linux desktop .deb
# Triggered on: version tags (v1.0.0, v1.2.3, …)
# Uniform versioning with nexis-hypervisor and nexis-controller.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  NEXIS_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}

jobs:
  build:
    name: Build Android APK + Desktop .deb
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Strip local gradle.properties overrides
        run: sed -i '/^org\.gradle\.java\.home/d' gradle.properties

      - name: Extract version
        id: ver
        run: |
          V="${{ env.NEXIS_VERSION }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIMESTAMP=$(date +%s)" >> "$GITHUB_ENV"

      - name: Prepare keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/nexis-release.jks
          else
            keytool -genkeypair -keystore /tmp/nexis-release.jks -storetype JKS \
              -alias nexis -keyalg RSA -keysize 2048 -validity 1 \
              -storepass temppass -keypass temppass \
              -dname "CN=CI, O=nexis, C=CH" -noprompt
            echo "KEYSTORE_PASSWORD=temppass" >> $GITHUB_ENV
            echo "KEY_ALIAS=nexis"            >> $GITHUB_ENV
            echo "KEY_PASSWORD=temppass"      >> $GITHUB_ENV
          fi

      # ── Android APK ──────────────────────────────────────────────────────────
      - name: Build and sign release APK
        env:
          BUILD_TIMESTAMP:   ${{ env.BUILD_TIMESTAMP }}
          KEYSTORE_PATH:     /tmp/nexis-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || env.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS || env.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD || env.KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "nexis-worker-${{ steps.ver.outputs.version }}.apk"

      # ── Desktop .deb ─────────────────────────────────────────────────────────
      - name: Install .deb build dependencies
        run: sudo apt-get install -y fakeroot binutils

      - name: Build desktop .deb
        env:
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gradle :desktopApp:packageDeb --no-daemon

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ env.NEXIS_VERSION }}"
          cat > notes.md << EOF
          ## Nexis Worker ${VERSION}

          ### Artefacts
          | File | Description |
          |------|-------------|
          | \`nexis-worker-${VERSION#v}.apk\` | Android application package |
          | \`nexis-worker-desktop_${VERSION#v}_amd64.deb\` | Linux desktop Debian package |

          ### Install — Android
          \`\`\`
          adb install nexis-worker-${VERSION#v}.apk
          \`\`\`
          Or sideload the APK directly. The app auto-updates on subsequent releases.

          ### Install — Linux Desktop
          \`\`\`bash
          sudo dpkg -i nexis-worker-desktop_${VERSION#v}_amd64.deb
          \`\`\`

          ---
          Part of the [Nexis ecosystem](https://github.com/santiagotoro2023).
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXIS_VERSION }}
          name: "NeXiS Worker ${{ env.NEXIS_VERSION }}"
          body_path: notes.md
          files: |
            nexis-worker-${{ steps.ver.outputs.version }}.apk
            desktopApp/build/compose/binaries/main/deb/nexis-worker-desktop_${{ steps.ver.outputs.version }}_amd64.deb
          draft: false
          prerelease: ${{ contains(env.NEXIS_VERSION, '-') }}
