# Nexis Worker — Release Pipeline
# Builds: Android APK + Linux desktop .deb + Windows .msi
# Triggered on: version tags, VERSION file bump on main, or workflow_dispatch.

name: Release

on:
  push:
    branches: [main]
    paths: ['VERSION']
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  # ── Android APK + Linux .deb ────────────────────────────────────────────────────────
  build-linux-android:
    name: Build Android APK + Linux .deb
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Strip local gradle.properties overrides
        run: sed -i '/^org\.gradle\.java\.home/d' gradle.properties

      - name: Extract version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          else
            V=$(cat VERSION | tr -d 'v \n')
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIMESTAMP=$(date +%s)" >> "$GITHUB_ENV"
          echo "VERSION=${V}" >> "$GITHUB_ENV"

      - name: Prepare keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/nexis-release.jks
          else
            keytool -genkeypair -keystore /tmp/nexis-release.jks -storetype JKS \
              -alias nexis -keyalg RSA -keysize 2048 -validity 1 \
              -storepass temppass -keypass temppass \
              -dname "CN=CI, O=nexis, C=CH" -noprompt
            echo "KEYSTORE_PASSWORD=temppass" >> $GITHUB_ENV
            echo "KEY_ALIAS=nexis"            >> $GITHUB_ENV
            echo "KEY_PASSWORD=temppass"      >> $GITHUB_ENV
          fi

      # ── Android APK ────────────────────────────────────────────────────────────────
      - name: Build and sign release APK
        env:
          BUILD_TIMESTAMP:   ${{ env.BUILD_TIMESTAMP }}
          KEYSTORE_PATH:     /tmp/nexis-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || env.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS || env.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD || env.KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "nexis-worker-${{ steps.ver.outputs.version }}.apk"

      # ── Desktop .deb ────────────────────────────────────────────────────────────────
      - name: Install .deb build dependencies
        run: sudo apt-get install -y fakeroot binutils

      - name: Build desktop .deb
        env:
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gradle :desktopApp:packageDeb --no-daemon

      # ── GitHub Release ────────────────────────────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          cat > notes.md << EOF
          ## Nexis Worker ${VERSION}

          ### Artefacts
          | File | Description |
          |------|-------------|
          | \`nexis-worker-${{ steps.ver.outputs.version }}.apk\` | Android application package |
          | \`nexis-worker-desktop_${{ steps.ver.outputs.version }}_amd64.deb\` | Linux desktop (Debian/Ubuntu) |
          | \`nexis-worker-desktop-${{ steps.ver.outputs.version }}.msi\` | Windows installer |

          ### Install — Android
          \`\`\`
          adb install nexis-worker-${{ steps.ver.outputs.version }}.apk
          \`\`\`
          Or sideload the APK directly.

          ### Install — Linux
          \`\`\`bash
          sudo dpkg -i nexis-worker-desktop_${{ steps.ver.outputs.version }}_amd64.deb
          \`\`\`

          ### Install — Windows
          Run \`nexis-worker-desktop-${{ steps.ver.outputs.version }}.msi\` and follow the installer.

          ---
          Part of the [Nexis ecosystem](https://github.com/santiagotoro2023).
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "NeXiS Worker v${{ steps.ver.outputs.version }}"
          body_path: notes.md
          files: |
            nexis-worker-${{ steps.ver.outputs.version }}.apk
            desktopApp/build/compose/binaries/main/deb/nexis-worker-desktop_${{ steps.ver.outputs.version }}_amd64.deb
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}

  # ── Windows .msi ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .msi
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Strip local gradle.properties overrides
        shell: bash
        run: sed -i '/^org\.gradle\.java\.home/d' gradle.properties

      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          else
            V=$(cat VERSION | tr -d 'v\r\n ')
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIMESTAMP=$(date +%s)" >> "$GITHUB_ENV"
          echo "VERSION=${V}" >> "$GITHUB_ENV"

      - name: Build Windows MSI
        env:
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gradle :desktopApp:packageMsi --no-daemon

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: desktopApp/build/compose/binaries/main/msi/nexis-worker-desktop-${{ steps.ver.outputs.version }}.msi
