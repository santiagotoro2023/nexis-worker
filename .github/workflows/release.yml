name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}

      # Decode the keystore from a base64 GitHub secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/nexis-release.jks

      - name: Set build timestamp
        run: echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      - name: Build release APK
        env:
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          KEYSTORE_PATH:    /tmp/nexis-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:    v${{ env.BUILD_TIMESTAMP }}
          release_name: NeXiS Worker v${{ env.BUILD_TIMESTAMP }}
          draft:       false
          prerelease:  false

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url:         ${{ steps.create_release.outputs.upload_url }}
          asset_path:         app/build/outputs/apk/release/app-release.apk
          asset_name:         nexis-worker-v${{ env.BUILD_TIMESTAMP }}.apk
          asset_content_type: application/vnd.android.package-archive
