name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Installs Gradle 8.9 and handles caching — no wrapper needed in repo
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/nexis-release.jks

      - name: Set build timestamp
        run: echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      - name: Build and sign release APK
        env:
          BUILD_TIMESTAMP:   ${{ env.BUILD_TIMESTAMP }}
          KEYSTORE_PATH:     /tmp/nexis-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_TIMESTAMP }}
          name:     NeXiS Worker v${{ env.BUILD_TIMESTAMP }}
          files:    app/build/outputs/apk/release/app-release.apk
